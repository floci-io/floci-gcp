quarkus:
  log:
    level: WARN
    category:
      "io.floci.gcp":
        level: INFO

floci-gcp:
  port: 4588
  default-project-id: test-project
  auth:
    validate-tokens: false
  ctf:
    hide-internal-endpoints: false
  storage:
    mode: memory
  services:
    datastore:
      enabled: true
    iam:
      enforcement-enabled: false
      strict-enforcement-enabled: false
    kafka:
      enabled: true
      mock: true
    cloudsql:
      enabled: true
      mock: true
    cloudtasks:
      enabled: true
    cloudrun:
      enabled: true
      mock: true
      execution:
        default-port: 8080
        startup-timeout: 240s
        request-timeout: 300s
        operation-timeout: 300s
        cleanup-timeout: 15s
        container-name-prefix: floci-cloudrun
        url-host-suffix:
    cloudfunctions:
      enabled: true
    monitoring:
      enabled: true
    scheduler:
      enabled: true
      invocation-enabled: true
      tick-interval-seconds: 1
    eventarc:
      enabled: true
    bigquery:
      enabled: true
    gke:
      enabled: true
      mock: true
    serviceusage:
      enabled: true
    resourcemanager:
      enabled: true
    firebaseauth:
      enabled: true
  docker:
    api-timeout: 30s
